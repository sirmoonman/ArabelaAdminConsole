<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservation Queue | Arabela Admin</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/database.js"></script>
    
    <script>
        // Authentication Guard
        if (localStorage.getItem('arabela_session_active') !== 'true') {
            window.location.replace('login.html');
        }

        function reservationComponent() {
            return {
                sidebarToggle: false,
                showModal: false,
                
                newRes: { name: '', gownId: '' },
                
                reservations: [],
                gowns: [],
                config: { depositAmount: 2000, paymentWindowHours: 48 },

                init() {
                    this.reservations = typeof ArabelaDB !== 'undefined' ? ArabelaDB.getReservations() : [];
                    this.gowns = typeof ArabelaDB !== 'undefined' ? ArabelaDB.getGowns() : [];
                    this.config = JSON.parse(localStorage.getItem('arabela_config')) || this.config;

                    this.autoCleanup();
                    setInterval(() => { 
                        this.autoCleanup(); 
                    }, 30000);
                },

                autoCleanup() {
                    const windowLimit = this.config.paymentWindowHours * 60 * 60 * 1000;
                    const now = new Date().getTime();
                    let databaseChanged = false;

                    this.reservations.forEach(res => {
                        if (res.status === 'Pending' && (now - res.createdAt) > windowLimit) {
                            res.status = 'Canceled';
                            if (typeof ArabelaDB !== 'undefined') ArabelaDB.syncGownStatus(res.gownId, 'Available');
                            databaseChanged = true;
                        }
                    });

                    if (databaseChanged && typeof ArabelaDB !== 'undefined') {
                        ArabelaDB.saveReservations(this.reservations);
                        this.reservations = ArabelaDB.getReservations();
                    }
                },

                getTimer(createdAt) {
                    const windowLimit = this.config.paymentWindowHours * 60 * 60 * 1000;
                    const now = new Date().getTime();
                    const diff = (createdAt + windowLimit) - now;
                    
                    if (diff <= 0) return 'EXPIRED';
                    
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    return `${hours}h ${minutes}m left`;
                },

                saveReservation() {
                    const selectedGown = this.gowns.find(g => String(g.id) === String(this.newRes.gownId));
                    if (!selectedGown) {
                        alert('Please select a valid gown.');
                        return;
                    }

                    const resEntry = {
                        id: Math.floor(1000 + Math.random() * 9000),
                        name: this.newRes.name,
                        gown: selectedGown.name,
                        gownId: selectedGown.id,
                        deposit: this.config.depositAmount, 
                        status: 'Pending',
                        createdAt: new Date().getTime(),
                        deadline: ''
                    };
                    
                    this.reservations.push(resEntry);
                    if (typeof ArabelaDB !== 'undefined') ArabelaDB.saveReservations(this.reservations);
                    
                    this.showModal = false;
                    this.newRes = { name: '', gownId: '' };
                },

                approvePayment(res) {
                    const targetIndex = this.reservations.findIndex(r => String(r.id) === String(res.id));
                    
                    if (targetIndex !== -1) {
                        const isAlreadyBooked = this.reservations.some(r => 
                            String(r.gownId) === String(res.gownId) && (r.status === 'Approved' || r.status === 'On Rent')
                        );
                        
                        if (isAlreadyBooked) {
                            alert('SYSTEM ALERT: Conflict detected. This gown is currently committed to another client.');
                            return;
                        }
                        
                        this.reservations[targetIndex].status = 'Approved';
                        
                        if (typeof ArabelaDB !== 'undefined') {
                            ArabelaDB.saveReservations(this.reservations);
                            ArabelaDB.syncGownStatus(res.gownId, 'Reserved'); 
                        }
                    }
                },

                releaseToClient(res) {
                    const days = prompt('Enter rental duration (Standard: 3-5 days):', '5');
                    if (days && !isNaN(days)) {
                        const targetIndex = this.reservations.findIndex(r => String(r.id) === String(res.id));
                        
                        if (targetIndex !== -1) {
                            const returnDate = new Date();
                            returnDate.setDate(returnDate.getDate() + parseInt(days, 10));
                            
                            this.reservations[targetIndex].status = 'On Rent';
                            this.reservations[targetIndex].deadline = returnDate.toISOString().split('T')[0]; 
                            
                            if (typeof ArabelaDB !== 'undefined') {
                                ArabelaDB.saveReservations(this.reservations);
                                ArabelaDB.syncGownStatus(res.gownId, 'Reserved');
                            }
                            
                            alert('Asset Deployed to Client: ' + this.reservations[targetIndex].name);
                            window.location.href = 'rentals.html';
                        }
                    }
                },

                rejectReservation(res) {
                    const targetIndex = this.reservations.findIndex(r => String(r.id) === String(res.id));
                    
                    if (targetIndex !== -1) {
                        this.reservations[targetIndex].status = 'Canceled';
                        
                        if (typeof ArabelaDB !== 'undefined') {
                            ArabelaDB.saveReservations(this.reservations);
                            ArabelaDB.syncGownStatus(res.gownId, 'Available');
                        }
                    }
                },

                // NEW FUNCTION: Completely removes the canceled record from the database array
                removeReservation(res) {
                    if (confirm('Are you sure you want to permanently remove this canceled record?')) {
                        const targetIndex = this.reservations.findIndex(r => String(r.id) === String(res.id));
                        
                        if (targetIndex !== -1) {
                            this.reservations.splice(targetIndex, 1);
                            
                            if (typeof ArabelaDB !== 'undefined') {
                                ArabelaDB.saveReservations(this.reservations);
                            }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .font-serif { font-family: 'Times', serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="reservationComponent()" class="bg-white font-sans text-[#1A1A1A]">
    <div class="flex h-screen overflow-hidden bg-white">
        <include src="./partials/sidebar.html"></include>

        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">
            <include src="./partials/header.html" />

            <main>
                <div class="p-6 mx-auto max-w-[1400px] md:p-10">
                    
                    <div class="mb-10 flex justify-between items-end border-b border-[#F0EDE7] pb-8">
                        <div>
                            <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">Reservation Queue</h2>
                            <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Verified Holds & Pending Deposits</p>
                        </div>
                        <button @click="showModal = true" class="bg-[#1A1A1A] text-white px-8 py-3 text-[10px] font-bold uppercase tracking-[0.2em] rounded shadow-lg">
                            + New Booking
                        </button>
                    </div>

                    <div class="rounded-sm border border-[#E5E1DA] bg-white shadow-sm overflow-x-auto">
                        <div class="flex flex-col min-w-[1100px]">
                            
                            <div class="grid grid-cols-12 bg-[#F9F5F0] border-b border-[#E5E1DA] text-[11px] font-bold uppercase tracking-[0.2em] text-[#A8A297]">
                                <div class="p-6 col-span-3">Customer Details</div>
                                <div class="p-6 col-span-3">Gown Selection</div>
                                <div class="p-6 col-span-2 text-center">Payment Window</div>
                                <div class="p-6 col-span-2 text-center">Status</div>
                                <div class="p-6 col-span-2 text-center">Action</div>
                            </div>

                            <template x-for="res in reservations.filter(r => r.status !== 'On Rent' && r.status !== 'Completed')" :key="res.id">
                                <div class="grid grid-cols-12 border-b border-[#F0EDE7] items-center hover:bg-[#F9F5F0]/30 transition-colors">
                                    
                                    <div class="p-8 col-span-3">
                                        <p class="text-lg font-bold text-[#1A1A1A] mb-1" x-text="res.name"></p>
                                        <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-widest" x-text="'Ref ID: ARB-' + res.id"></p>
                                    </div>

                                    <div class="p-8 col-span-3">
                                        <p class="text-sm font-semibold text-[#1A1A1A] mb-1" x-text="res.gown"></p>
                                        <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-widest" x-text="'Gown ID: ' + res.gownId"></p>
                                    </div>

                                    <div class="p-8 col-span-2 text-center">
                                        <div class="inline-block px-5 py-2 rounded-full bg-[#F9F5F0] border border-[#E5E1DA]">
                                            <p class="text-[11px] font-mono font-bold tracking-wider" 
                                               :class="getTimer(res.createdAt) === 'EXPIRED' ? 'text-red-600' : 'text-[#1A1A1A]'"
                                               x-text="getTimer(res.createdAt)"></p>
                                        </div>
                                    </div>

                                    <div class="p-8 col-span-2 text-center">
                                        <span class="text-[10px] font-black uppercase tracking-widest px-4 py-1.5 rounded-full border shadow-sm"
                                            :class="{
                                                'bg-yellow-50 text-yellow-600 border-yellow-200': res.status === 'Pending',
                                                'bg-green-50 text-green-600 border-green-200': res.status === 'Approved',
                                                'bg-red-50 text-red-600 border-red-200': res.status === 'Canceled'
                                            }" x-text="res.status"></span>
                                    </div>

                                    <div class="p-8 col-span-2 flex flex-col gap-2 items-center">
                                        <template x-if="res.status === 'Pending'">
                                            <div class="flex flex-col w-full gap-2">
                                                <button @click="approvePayment(res)" class="w-full bg-green-600 text-white py-2 text-[10px] font-bold uppercase rounded shadow-sm hover:bg-green-700">Approve Payment</button>
                                                <button @click="rejectReservation(res)" class="w-full border border-red-500 text-red-500 py-2 text-[10px] font-bold uppercase rounded hover:bg-red-50">Reject</button>
                                            </div>
                                        </template>

                                        <template x-if="res.status === 'Approved'">
                                            <div class="flex flex-col w-full gap-2">
                                                <button @click="releaseToClient(res)" class="w-full bg-[#1A1A1A] text-white py-2 text-[10px] font-bold uppercase rounded shadow-md hover:bg-opacity-80">Release to Client</button>
                                                <button @click="rejectReservation(res)" class="text-[9px] font-black text-[#A8A297] hover:text-red-600 uppercase tracking-widest mt-1">Cancel</button>
                                            </div>
                                        </template>

                                        <template x-if="res.status === 'Canceled'">
                                            <div class="flex flex-col w-full gap-2">
                                                <button @click="removeReservation(res)" class="w-full bg-red-600 text-white py-2 text-[10px] font-bold uppercase rounded shadow-sm hover:bg-red-700">Remove</button>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div x-show="showModal" class="fixed inset-0 z-[999] flex items-center justify-center bg-black/40 backdrop-blur-sm p-4" x-cloak>
        <div @click.outside="showModal = false" class="w-full max-w-md bg-white p-10 rounded shadow-2xl">
            <h3 class="text-center font-serif font-bold text-[#1A1A1A] uppercase tracking-[0.2em] mb-8 text-xl">New Reservation</h3>
            <form @submit.prevent="saveReservation()">
                <div class="mb-6">
                    <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Customer Name</label>
                    <input x-model="newRes.name" type="text" required class="w-full border border-[#E5E1DA] p-4 text-sm focus:border-[#1A1A1A] outline-none" placeholder="Enter Full Name">
                </div>
                <div class="mb-10">
                    <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Select Available Gown</label>
                    <select x-model="newRes.gownId" required class="w-full border border-[#E5E1DA] p-4 text-sm outline-none bg-transparent">
                        <option value="">-- Select from Inventory --</option>
                        <template x-for="gown in gowns.filter(g => g.status === 'Available')" :key="gown.id">
                            <option :value="gown.id" x-text="gown.name + ' (#' + gown.id + ')'"></option>
                        </template>
                    </select>
                </div>
                <div class="flex gap-4">
                    <button type="button" @click="showModal = false" class="flex-1 border border-[#E5E1DA] p-4 text-[10px] font-bold uppercase tracking-widest hover:bg-[#F9F5F0]">Cancel</button>
                    <button type="submit" class="flex-1 bg-[#1A1A1A] text-white p-4 text-[10px] font-bold uppercase tracking-widest hover:bg-opacity-80">Start Hold</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
