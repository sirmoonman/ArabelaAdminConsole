<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reservation Queue | Arabela Admin</title>

    <script src="js/database.js"></script>

    <script>

      if (localStorage.getItem('arabela_session_active') !== 'true') {

        window.location.replace('login.html');

      }

    </script>

    <style>

      .font-serif { font-family: 'Times', serif; }

      [x-cloak] { display: none !important; }

    </style>

  </head>

  <body

    x-data="{

      'sidebarToggle': false,

      'showModal': false,

      'reservations': ArabelaDB.getReservations(),

      'gowns': ArabelaDB.getGowns(),

      'newRes': { name: '', gownId: '' },

     

      // Load Dynamic Config (Matches Capstone Objectives for Centralized Platform)

      'config': JSON.parse(localStorage.getItem('arabela_config')) || { depositAmount: 2000, paymentWindowHours: 48 },



      // AUTOMATED GARBAGE COLLECTION: Enforces the 48-hour payment window business rule [cite: 86]

      autoCleanup() {

        const windowLimit = this.config.paymentWindowHours * 60 * 60 * 1000;

        const now = new Date().getTime();

        let databaseChanged = false;



        this.reservations.forEach(res => {

          if (res.status === 'Pending' && (now - res.createdAt) > windowLimit) {

            res.status = 'Canceled';

            // Return gown to available status automatically [cite: 86]

            ArabelaDB.syncGownStatus(res.gownId, 'Available');

            databaseChanged = true;

          }

        });



        if (databaseChanged) {

          ArabelaDB.saveReservations(this.reservations);

          this.reservations = ArabelaDB.getReservations();

        }

      },



      getTimer(createdAt) {

        const windowLimit = this.config.paymentWindowHours * 60 * 60 * 1000;

        const now = new Date().getTime();

        const diff = (createdAt + windowLimit) - now;

       

        if (diff <= 0) return 'EXPIRED';

       

        const hours = Math.floor(diff / (1000 * 60 * 60));

        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        return `${hours}h ${minutes}m left`;

      },



      saveReservation() {

        const selectedGown = this.gowns.find(g => g.id === this.newRes.gownId);

        const resEntry = {

          id: Math.floor(1000 + Math.random() * 9000),

          name: this.newRes.name,

          gown: selectedGown.name,

          gownId: selectedGown.id,

          deposit: this.config.depositAmount,

          status: 'Pending',

          createdAt: new Date().getTime(),

          deadline: ''

        };

        this.reservations.push(resEntry);

        ArabelaDB.saveReservations(this.reservations);

        this.showModal = false;

        this.newRes = { name: '', gownId: '' };

      },



      approvePayment(res) {

        // Conflict-Checking Logic to prevent double-booking [cite: 40, 385]

        const isAlreadyBooked = this.reservations.some(r =>

          r.gownId === res.gownId && (r.status === 'Approved' || r.status === 'On Rent')

        );

        if (isAlreadyBooked) {

          alert('SYSTEM ALERT: Conflict detected. This gown is currently committed to another client.');

          return;

        }

        res.status = 'Approved';

        ArabelaDB.saveReservations(this.reservations);

        ArabelaDB.syncGownStatus(res.gownId, 'Reserved');

      },



      releaseToClient(res) {

        const days = prompt('Enter rental duration (Standard: 3-5 days):', '5');

        if (days && !isNaN(days)) {

          const returnDate = new Date();

          returnDate.setDate(returnDate.getDate() + parseInt(days));

         

          res.status = 'On Rent';

          res.deadline = returnDate.toISOString().split('T')[0];

         

          ArabelaDB.saveReservations(this.reservations);

          ArabelaDB.syncGownStatus(res.gownId, 'Reserved');

         

          alert('Asset Deployed to Client: ' + res.name);

          window.location.href = 'rentals.html';

        }

      },



      rejectReservation(res) {

        res.status = 'Canceled';

        ArabelaDB.saveReservations(this.reservations);

        ArabelaDB.syncGownStatus(res.gownId, 'Available');

      }

    }"

    x-init="autoCleanup(); setInterval(() => { autoCleanup(); reservations = [...reservations] }, 30000)"

    class="bg-white font-sans text-[#1A1A1A]"

  >

                + New Booking

            <div class="rounded-sm border border-[#E5E1DA] bg-white shadow-sm overflow-x-auto">

                <div class="grid grid-cols-12 bg-[#F9F5F0] border-b border-[#E5E1DA] text-[11px] font-bold uppercase tracking-[0.2em] text-[#A8A297]">

                        :class="{

                          'bg-yellow-50 text-yellow-600 border-
