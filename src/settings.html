<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Settings | Arabela Admin</title>
    <script src="js/database.js"></script>
    <style>
      .font-serif { font-family: 'Times', serif; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body
    x-data="{ 
      'sidebarToggle': false,
      'isSaving': false,
      
      // Global Parameters (Normally fetched from ArabelaDB)
      'config': {
        depositAmount: 2000,
        lateFeePerDay: 200,
        paymentWindowHours: 3,
        maxCancellations: 2,
        cleaningFee: 500,
        repairFeeMinimum: 1000
      },

      saveSettings() {
        this.isSaving = true;
        // Simulate database save delay
        setTimeout(() => {
          // ArabelaDB.saveConfig(this.config); // Future DB connection
          this.isSaving = false;
          alert('System parameters successfully updated. New rules will apply to all future transactions.');
        }, 800);
      }
    }"
    class="bg-white font-sans text-[#1A1A1A]"
  >
    <div class="flex h-screen overflow-hidden bg-white">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">
        <include src="./partials/header.html" />

        <main>
          <div class="p-6 mx-auto max-w-4xl md:p-10">
            
            <div class="mb-10 border-b border-[#F0EDE7] pb-8">
              <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">System Configuration</h2>
              <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Global Parameters & Business Rules</p>
            </div>

            <form @submit.prevent="saveSettings()">
              <div class="space-y-10">
                
                <div class="rounded-sm border border-[#E5E1DA] bg-white p-8 shadow-sm">
                  <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b border-[#F0EDE7] pb-4">Financial Parameters</h3>
                  
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Standard Security Deposit (₱)</label>
                      <input type="number" x-model="config.depositAmount" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] transition-colors">
                      <p class="text-[9px] text-[#A8A297] mt-2 italic">Applied automatically to all new reservations.</p>
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Late Return Penalty (₱ / Day)</label>
                      <input type="number" x-model="config.lateFeePerDay" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-red-600 outline-none focus:border-[#1A1A1A] transition-colors">
                      <p class="text-[9px] text-[#A8A297] mt-2 italic">Multiplier applied for every 24 hours past the deadline.</p>
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Flat Cleaning Fee (₱)</label>
                      <input type="number" x-model="config.cleaningFee" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] transition-colors">
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Base Repair Fee (₱)</label>
                      <input type="number" x-model="config.repairFeeMinimum" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] transition-colors">
                    </div>
                  </div>
                </div>

                <div class="rounded-sm border border-[#E5E1DA] bg-white p-8 shadow-sm">
                  <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b border-[#F0EDE7] pb-4">Operational Guidelines</h3>
                  
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Payment Window Limit (Hours)</label>
                      <select x-model="config.paymentWindowHours" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A]">
                        <option value="3">3 Hours (Strict Hold)</option>
                        <option value="12">12 Hours (Standard Hold)</option>
                        <option value="24">24 Hours (Extended Hold)</option>
                        <option value="48">48 Hours (Paper Default)</option>
                      </select>
                      <p class="text-[9px] text-yellow-600 mt-2 font-bold uppercase tracking-widest">Controls Auto-Expire Logic</p>
                    </div>
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Abuse Tolerance (Max Cancellations)</label>
                      <input type="number" x-model="config.maxCancellations" class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] transition-colors">
                      <p class="text-[9px] text-[#A8A297] mt-2 italic">Triggers automatic account restriction warning.</p>
                    </div>
                  </div>
                </div>

              </div>

              <div class="mt-10 flex justify-end">
                <button type="submit" :disabled="isSaving" class="bg-[#1A1A1A] text-white px-12 py-4 text-[10px] font-bold uppercase tracking-[0.2em] rounded shadow-xl hover:bg-opacity-90 transition-all disabled:opacity-50 flex items-center gap-2">
                  <span x-show="!isSaving">Save Configuration</span>
                  <span x-show="isSaving" x-cloak>Applying Updates...</span>
                </button>
              </div>
            </form>

          </div>
        </main>
      </div>
    </div>
  </body>
</html>
