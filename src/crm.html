<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Directory | Arabela Admin</title>
    <script src="js/database.js"></script>
    <style>
      .font-serif { font-family: 'Times', serif; }
      [x-cloak] { display: none !important; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body
    x-data="{ 
      'sidebarToggle': false,
      'showProfileModal': false,
      'selectedClient': null,
      'reservations': ArabelaDB.getReservations(),
      'clientStatuses': JSON.parse(localStorage.getItem('arabela_client_status')) || {},
      'clientPhones': JSON.parse(localStorage.getItem('arabela_client_phones')) || {},
      'clientNotes': JSON.parse(localStorage.getItem('arabela_client_notes')) || {},
      
      generatePhone() {
        const randomNum = Math.floor(100000000 + Math.random() * 900000000).toString();
        return '+63 9' + randomNum.substring(0,2) + ' ' + randomNum.substring(2,5) + ' ' + randomNum.substring(5);
      },

      savePhones() {
        localStorage.setItem('arabela_client_phones', JSON.stringify(this.clientPhones));
      },

      saveNotes() {
        if(this.selectedClient) {
          this.clientNotes[this.selectedClient.name] = this.selectedClient.note;
          localStorage.setItem('arabela_client_notes', JSON.stringify(this.clientNotes));
        }
      },

      get clients() {
        const clientMap = {};
        let phonesUpdated = false;
        
        this.reservations.forEach(r => {
          const clientName = r.name.trim();

          if (!clientMap[clientName]) {
            if (!this.clientPhones[clientName]) {
              this.clientPhones[clientName] = this.generatePhone();
              phonesUpdated = true;
            }

            clientMap[clientName] = {
              id: 'C-' + clientName.substring(0,3).toUpperCase() + r.id.toString().substring(0,3),
              name: clientName,
              phone: this.clientPhones[clientName],
              totalRents: 0,
              cancellations: 0,
              status: this.clientStatuses[clientName] || 'Active'
            };
          }
          
          if (r.status === 'Completed' || r.status === 'On Rent' || r.status === 'Approved') {
            clientMap[clientName].totalRents++;
          }
          if (r.status === 'Canceled') {
            clientMap[clientName].cancellations++;
          }
        });

        if (phonesUpdated) this.savePhones();

        Object.values(clientMap).forEach(client => {
          if (client.cancellations > 2 && client.status === 'Active') {
             client.status = 'Warning';
             this.clientStatuses[client.name] = 'Warning';
             this.saveStatuses();
          }
        });

        return Object.values(clientMap);
      },

      saveStatuses() {
        localStorage.setItem('arabela_client_status', JSON.stringify(this.clientStatuses));
      },

      toggleRestriction(client) {
        if (client.status === 'Restricted') {
          this.clientStatuses[client.name] = 'Active';
        } else {
          this.clientStatuses[client.name] = 'Restricted';
        }
        this.saveStatuses();
      },

      issueWarning(client) {
        if (client.status !== 'Restricted') {
          this.clientStatuses[client.name] = 'Warning';
          this.saveStatuses();
        }
      },

      openProfile(client) {
        this.selectedClient = client;
        this.selectedClient.history = this.reservations.filter(r => r.name.trim() === client.name);
        this.selectedClient.note = this.clientNotes[client.name] || '';
        this.showProfileModal = true;
      }
    }"
    class="bg-white font-sans text-[#1A1A1A]"
  >
    <div class="flex h-screen overflow-hidden bg-white">
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">
        <include src="./partials/header.html" />

        <main>
          <div class="p-6 mx-auto max-w-(--breakpoint-2xl) md:p-10">
            
            <div class="mb-10 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between border-b border-[#F0EDE7] pb-8">
              <div>
                <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">Client Directory</h2>
                <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Customer Relations & Abuse Monitoring</p>
              </div>
              <div class="flex gap-4">
                <div class="bg-red-50 text-red-700 px-6 py-3 rounded-sm text-center border border-red-100">
                  <p class="text-[8px] font-black uppercase tracking-widest mb-1">Restricted Accounts</p>
                  <p class="text-xl font-black" x-text="clients.filter(c => c.status === 'Restricted').length"></p>
                </div>
                <div class="bg-[#F9F5F0] border border-[#E5E1DA] px-6 py-3 rounded-sm text-center">
                  <p class="text-[8px] text-[#A8A297] font-black uppercase tracking-widest mb-1">Total Database</p>
                  <p class="text-xl font-black text-[#1A1A1A]" x-text="clients.length"></p>
                </div>
              </div>
            </div>

            <div class="rounded-sm border border-[#E5E1DA] bg-white shadow-sm overflow-x-auto">
              <div class="flex flex-col min-w-[1100px]">
                
                <div class="grid grid-cols-12 bg-[#F9F5F0] border-b border-[#E5E1DA] text-[11px] font-bold uppercase tracking-[0.2em] text-[#A8A297]">
                  <div class="p-6 col-span-3">Client Profile</div>
                  <div class="p-6 col-span-2 text-center">Contact</div>
                  <div class="p-6 col-span-2 text-center">Lifetime Rentals</div>
                  <div class="p-6 col-span-2 text-center">Cancellations</div>
                  <div class="p-6 col-span-1 text-center">Status</div>
                  <div class="p-6 col-span-2 text-right">Account Control</div>
                </div>

                <template x-for="client in clients" :key="client.id">
                  <div class="grid grid-cols-12 border-b border-[#F0EDE7] items-center hover:bg-[#F9F5F0]/30 transition-colors">
                    
                    <div class="p-8 col-span-3">
                      <p class="text-lg font-bold text-[#1A1A1A] mb-1" x-text="client.name"></p>
                      <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-widest" x-text="'ID: ' + client.id"></p>
                    </div>

                    <div class="p-8 col-span-2 text-center">
                      <p class="text-[10px] font-mono font-bold text-[#A8A297] uppercase tracking-widest" x-text="client.phone"></p>
                    </div>

                    <div class="p-8 col-span-2 text-center">
                      <p class="text-xl font-black text-[#1A1A1A]" x-text="client.totalRents"></p>
                    </div>

                    <div class="p-8 col-span-2 text-center">
                      <p class="text-xl font-black" 
                         :class="client.cancellations > 2 ? 'text-red-600' : 'text-[#1A1A1A]'"
                         x-text="client.cancellations"></p>
                      <template x-if="client.cancellations > 2">
                         <p class="text-[8px] text-red-600 font-bold uppercase mt-1 tracking-widest">High Risk</p>
                      </template>
                    </div>

                    <div class="p-8 col-span-1 text-center">
                      <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded border shadow-sm"
                            :class="{
                              'bg-green-50 text-green-600 border-green-200': client.status === 'Active',
                              'bg-yellow-50 text-yellow-600 border-yellow-200': client.status === 'Warning',
                              'bg-red-50 text-red-600 border-red-200': client.status === 'Restricted'
                            }"
                            x-text="client.status"></span>
                    </div>

                    <div class="p-8 col-span-2 flex justify-end gap-2">
                      <button @click="openProfile(client)" class="bg-[#F9F5F0] border border-[#E5E1DA] text-[#1A1A1A] px-4 py-2 text-[9px] font-bold uppercase tracking-widest rounded shadow-sm hover:border-[#1A1A1A] transition-all">
                        View Profile
                      </button>
                      
                      <template x-if="client.status !== 'Restricted'">
                        <button @click="toggleRestriction(client)" class="bg-white border border-red-200 text-red-600 px-4 py-2 text-[9px] font-bold uppercase tracking-widest rounded shadow-sm hover:bg-red-50 transition-all">
                          Restrict
                        </button>
                      </template>
                      <template x-if="client.status === 'Restricted'">
                        <button @click="toggleRestriction(client)" class="bg-[#1A1A1A] text-white px-4 py-2 text-[9px] font-bold uppercase tracking-widest rounded shadow-sm hover:bg-opacity-80 transition-all">
                          Lift Ban
                        </button>
                      </template>
                    </div>

                  </div>
                </template>

                <template x-if="clients.length === 0">
                  <div class="p-32 text-center">
                    <p class="text-[11px] text-[#A8A297] font-bold uppercase tracking-[0.4em]">No client data generated yet.</p>
                  </div>
                </template>

              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <div x-show="showProfileModal" class="fixed inset-0 z-999 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4" x-cloak>
      <div @click.outside="showProfileModal = false" class="w-full max-w-3xl bg-white rounded shadow-2xl flex flex-col max-h-[90vh]">
        
        <template x-if="selectedClient">
          <div class="flex flex-col h-full">
            
            <div class="p-8 border-b border-[#F0EDE7] flex justify-between items-start bg-[#F9F5F0]">
              <div>
                <h3 class="font-serif font-bold text-[#1A1A1A] uppercase tracking-[0.2em] text-2xl" x-text="selectedClient.name"></h3>
                <p class="text-[10px] font-mono font-bold text-[#A8A297] uppercase tracking-widest mt-2" x-text="'SYS-ID: ' + selectedClient.id + ' | PHONE: ' + selectedClient.phone"></p>
              </div>
              <button @click="showProfileModal = false" class="text-[#A8A297] hover:text-[#1A1A1A] font-bold text-xl">&times;</button>
            </div>

            <div class="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-8">
              
              <div>
                <h4 class="text-[10px] font-black text-[#1A1A1A] uppercase tracking-widest mb-4 border-b border-[#F0EDE7] pb-2">Rental Ledger</h4>
                <div class="space-y-3">
                  <template x-for="res in selectedClient.history" :key="res.id">
                    <div class="p-4 border border-[#E5E1DA] rounded-sm bg-white shadow-sm flex flex-col gap-2">
                      <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-[#1A1A1A]" x-text="res.gown"></span>
                        <span class="text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded border"
                              :class="{
                                'bg-green-50 text-green-600 border-green-200': res.status === 'Completed',
                                'bg-yellow-50 text-yellow-600 border-yellow-200': res.status === 'Pending' || res.status === 'Approved',
                                'bg-blue-50 text-blue-600 border-blue-200': res.status === 'On Rent',
                                'bg-red-50 text-red-600 border-red-200': res.status === 'Canceled'
                              }"
                              x-text="res.status"></span>
                      </div>
                      <p class="text-[9px] text-[#A8A297] font-mono uppercase">Log: <span x-text="new Date(res.createdAt).toLocaleDateString('en-GB')"></span></p>
                    </div>
                  </template>
                </div>
              </div>

              <div>
                <h4 class="text-[10px] font-black text-[#1A1A1A] uppercase tracking-widest mb-4 border-b border-[#F0EDE7] pb-2">Internal Remarks</h4>
                <textarea x-model="selectedClient.note" @input="saveNotes()" 
                          class="w-full h-48 border border-[#E5E1DA] p-4 text-sm outline-none focus:border-[#1A1A1A] bg-[#F9F5F0] resize-none" 
                          placeholder="Add operational notes, measurements, or behavior warnings here..."></textarea>
                <p class="text-[8px] text-[#A8A297] uppercase tracking-widest mt-2 font-bold text-right">Autosaves on type</p>
              </div>

            </div>
          </div>
        </template>
      </div>
    </div>
  </body>
</html>
