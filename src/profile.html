<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Profile | Arabela Admin</title>
    <script src="js/database.js"></script>
    <script>
      if (localStorage.getItem('arabela_session_active') !== 'true') {
        window.location.replace('login.html');
      }
    </script>
    <style>
      .font-serif { font-family: 'Times', serif; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body
    x-data="{ 
      'sidebarToggle': false,
      'isSaving': false,
      
      // PERSISTENCE: Initialize from storage or capstone defaults
      'admin': JSON.parse(localStorage.getItem('arabela_admin_profile')) || {
        id: 'EMP-001',
        name: 'Jose Miguel Tolentino C.',
        role: 'System Administrator',
        email: 'jmtolentino@arabela.com',
        phone: '0917-XXX-XXXX',
        lastLogin: new Date(new Date().getTime() - 3600000).toLocaleString()
      },

      'passwords': {
        current: '',
        new: '',
        confirm: ''
      },

      // Audit Trail matches capstone requirement for transparency [cite: 257]
      'activityLog': [
        { action: 'Approved Payment', target: 'Ref: ARB-9102', time: '10 mins ago', type: 'success' },
        { action: 'Updated Settings', target: 'Global Parameters', time: '1 hour ago', type: 'warning' },
        { action: 'Restricted User', target: 'Denmark C.', time: '2 hours ago', type: 'danger' },
        { action: 'Added Inventory', target: 'Royal Ivory Collection', time: '1 day ago', type: 'info' },
        { action: 'Processed Return', target: 'Ref: ARB-7331', time: '1 day ago', type: 'success' }
      ],

      saveProfile() {
        this.isSaving = true;
        setTimeout(() => {
          localStorage.setItem('arabela_admin_profile', JSON.stringify(this.admin));
          this.isSaving = false;
          alert('SYSTEM NOTIFICATION: Identity updated. Session persistence active.');
          window.location.reload(); // Force header refresh
        }, 800);
      },

      updatePassword() {
        if (this.passwords.new !== this.passwords.confirm) {
          alert('CRITICAL ERROR: New passwords do not match.');
          return;
        }
        if (this.passwords.new.length < 8) {
          alert('SECURITY ERROR: Minimum 8 characters required.');
          return;
        }
        alert('SECURITY PROTOCOL: Passcode updated. Active on next authentication.');
        this.passwords = { current: '', new: '', confirm: '' };
      }
    }"
    class="bg-white font-sans text-[#1A1A1A]"
  >
    <div class="flex h-screen overflow-hidden bg-white">
      
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">
        <include src="./partials/header.html" />

        <main>
          <div class="p-6 mx-auto max-w-(--breakpoint-2xl) md:p-10">
            
            <div class="mb-10 border-b border-[#F0EDE7] pb-8">
              <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">Administrator Profile</h2>
              <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Account Management & System Audit Trail</p>
            </div>

            <div class="grid grid-cols-12 gap-8">
              
              <div class="col-span-12 lg:col-span-7 space-y-8">
                
                <div class="rounded-sm border border-[#E5E1DA] bg-white p-8 shadow-sm">
                  <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b border-[#F0EDE7] pb-4">Identity Details</h3>
                  
                  <form @submit.prevent="saveProfile()" class="space-y-6">
                    <div class="flex gap-6 items-center mb-8">
                      <div class="h-20 w-20 rounded-full bg-[#1A1A1A] flex items-center justify-center text-white text-2xl font-serif">
                        <span x-text="admin.name.charAt(0)"></span>
                      </div>
                      <div>
                        <p class="text-lg font-bold text-[#1A1A1A] uppercase tracking-widest" x-text="admin.name"></p>
                        <p class="text-[10px] font-black text-[#A8A297] uppercase tracking-widest mt-1" x-text="admin.role + ' | ' + admin.id"></p>
                      </div>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Full Name</label>
                        <input type="text" x-model="admin.name" required class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 text-sm font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] focus:bg-white transition-colors">
                      </div>
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Email Address</label>
                        <input type="email" x-model="admin.email" required class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 text-sm font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] focus:bg-white transition-colors">
                      </div>
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Contact Number</label>
                        <input type="text" x-model="admin.phone" required class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 text-sm font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] focus:bg-white transition-colors">
                      </div>
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Last Login Attempt</label>
                        <input type="text" x-model="admin.lastLogin" disabled class="w-full border border-[#E5E1DA] bg-gray-50 p-4 text-[10px] font-mono text-[#A8A297] outline-none cursor-not-allowed">
                      </div>
                    </div>

                    <div class="flex justify-end pt-4">
                      <button type="submit" :disabled="isSaving" class="bg-[#1A1A1A] text-white px-8 py-3 text-[10px] font-bold uppercase tracking-[0.2em] rounded shadow-md hover:bg-opacity-90 transition-all disabled:opacity-50 h-12 min-w-[160px]">
                        <span x-show="!isSaving">Update Identity</span>
                        <span x-show="isSaving" x-cloak class="animate-pulse">Saving...</span>
                      </button>
                    </div>
                  </form>
                </div>

                <div class="rounded-sm border border-[#E5E1DA] bg-white p-8 shadow-sm">
                  <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b border-[#F0EDE7] pb-4">Security Credentials</h3>
                  
                  <form @submit.prevent="updatePassword()" class="space-y-6">
                    <div>
                      <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Current Password</label>
                      <input type="password" x-model="passwords.current" required class="w-full border border-[#E5E1DA] p-4 text-sm outline-none focus:border-[#1A1A1A] bg-[#F9F5F0] focus:bg-white transition-colors">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">New Password</label>
                        <input type="password" x-model="passwords.new" required class="w-full border border-[#E5E1DA] p-4 text-sm outline-none focus:border-[#1A1A1A] bg-[#F9F5F0] focus:bg-white transition-colors">
                      </div>
                      <div>
                        <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">Confirm New Password</label>
                        <input type="password" x-model="passwords.confirm" required class="w-full border border-[#E5E1DA] p-4 text-sm outline-none focus:border-[#1A1A1A] bg-[#F9F5F0] focus:bg-white transition-colors">
                      </div>
                    </div>
                    
                    <div class="flex justify-end pt-4">
                      <button type="submit" class="border border-[#1A1A1A] text-[#1A1A1A] px-8 py-3 text-[10px] font-bold uppercase tracking-[0.2em] rounded hover:bg-[#F9F5F0] transition-all">
                        Update Password
                      </button>
                    </div>
                  </form>
                </div>

              </div>

              <div class="col-span-12 lg:col-span-5">
                <div class="rounded-sm border border-[#E5E1DA] bg-white p-8 shadow-sm h-full">
                  <div class="flex justify-between items-center mb-6 border-b border-[#F0EDE7] pb-4">
                    <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em]">Personal Audit Trail</h3>
                    <span class="text-[9px] font-black uppercase text-[#A8A297] bg-[#F9F5F0] px-2 py-1 rounded">Live Sync</span>
                  </div>
                  
                  <p class="text-[10px] text-[#A8A297] mb-6 tracking-widest uppercase">Recent actions performed by <span x-text="admin.id" class="text-[#1A1A1A] font-black"></span></p>

                  <div class="space-y-6 relative before:absolute before:inset-0 before:ml-2 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-[#E5E1DA] before:to-transparent pl-6 md:pl-0">
                    
                    <template x-for="log in activityLog">
                      <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                        
                        <div class="flex items-center justify-center w-4 h-4 rounded-full border-2 bg-white shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2 shadow-sm absolute -left-6 md:static"
                             :class="{
                               'border-green-500': log.type === 'success',
                               'border-yellow-500': log.type === 'warning',
                               'border-red-500': log.type === 'danger',
                               'border-blue-500': log.type === 'info'
                             }">
                        </div>
                        
                        <div class="w-full md:w-[calc(50%-1.5rem)] p-4 rounded-sm border border-[#E5E1DA] bg-[#F9F5F0] shadow-sm">
                          <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-[#1A1A1A] uppercase tracking-widest mb-1" x-text="log.action"></span>
                            <span class="text-[9px] font-bold text-[#A8A297] uppercase" x-text="log.target"></span>
                            <span class="text-[8px] font-mono text-[#A8A297] mt-3" x-text="log.time"></span>
                          </div>
                        </div>

                      </div>
                    </template>

                  </div>
                  
                  <div class="mt-8 text-center pt-6 border-t border-[#F0EDE7]">
                    <button class="text-[9px] font-bold text-[#A8A297] hover:text-[#1A1A1A] uppercase tracking-widest transition-colors">
                      Download Full Audit Report (PDF)
                    </button>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
