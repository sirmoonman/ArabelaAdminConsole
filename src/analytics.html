<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports & Analytics | Arabela Admin</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/database.js"></script>
    
    <script>
        // Authentication Guard
        if (localStorage.getItem('arabela_session_active') !== 'true') {
            window.location.replace('login.html');
        }

        // Logic safely moved to a function to prevent HTML parsing errors
        function analyticsComponent() {
            return {
                sidebarToggle: false,
                reservations: typeof ArabelaDB !== 'undefined' ? ArabelaDB.getReservations() : [],
                gowns: typeof ArabelaDB !== 'undefined' ? ArabelaDB.getGowns() : [],

                init() {
                    // Delay chart initialization slightly to ensure canvas elements are fully rendered by the DOM
                    setTimeout(() => this.initCharts(), 150);
                },

                get completedTransactions() {
                    return this.reservations.filter(r => r.status === 'Completed');
                },

                get totalRevenue() {
                    return this.completedTransactions.reduce((sum, r) => sum + (Number(r.deposit) || 0) + (Number(r.finalFine) || 0), 0);
                },

                get totalPenalties() {
                    return this.completedTransactions.reduce((sum, r) => sum + (Number(r.finalFine) || 0), 0);
                },

                get cancellationRate() {
                    const total = this.reservations.length;
                    if (total === 0) return 0;
                    const canceled = this.reservations.filter(r => r.status === 'Canceled').length;
                    return Math.round((canceled / total) * 100);
                },

                get topPerformer() {
                    if (this.completedTransactions.length === 0) return 'No Data';
                    const counts = {};
                    this.completedTransactions.forEach(r => { counts[r.gown] = (counts[r.gown] || 0) + 1; });
                    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                    return sorted[0] ? sorted[0][0] : 'N/A';
                },

                initCharts() {
                    // 1. Revenue Trend Logic
                    const monthlyData = new Array(12).fill(0);
                    this.completedTransactions.forEach(res => {
                        const date = new Date(res.returnDate || res.createdAt);
                        monthlyData[date.getMonth()] += (Number(res.deposit) || 0) + (Number(res.finalFine) || 0);
                    });

                    new Chart(document.getElementById('revenueChart'), {
                        type: 'bar',
                        data: {
                            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                            datasets: [{ label: 'Revenue (₱)', data: monthlyData, backgroundColor: '#1A1A1A' }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });

                    // 2. Inventory Health Logic
                    const invData = [
                        this.gowns.filter(g => g.status === 'Available').length,
                        this.reservations.filter(r => r.status === 'On Rent').length,
                        this.gowns.filter(g => g.status === 'Damaged').length
                    ];

                    new Chart(document.getElementById('inventoryChart'), {
                        type: 'doughnut',
                        data: {
                            labels: ['Available', 'Rented', 'Maintenance'],
                            datasets: [{ data: invData, backgroundColor: ['#22c55e', '#3b82f6', '#ef4444'] }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, cutout: '75%' }
                    });

                    // 3. IMPROVED: Category Performance Logic via Relational Lookup
                    const catMap = {};
                    this.completedTransactions.forEach(r => {
                        // Lookup the gown object using the foreign key (gownId) to find its category
                        const matchedGown = this.gowns.find(g => String(g.id) === String(r.gownId));
                        
                        // Extract category from the matched gown, fallback if deleted/missing
                        const cat = (matchedGown && matchedGown.category) ? matchedGown.category : 'Uncategorized';
                        
                        catMap[cat] = (catMap[cat] || 0) + (Number(r.deposit) || 0) + (Number(r.finalFine) || 0);
                    });

                    new Chart(document.getElementById('categoryChart'), {
                        type: 'polarArea',
                        data: {
                            labels: Object.keys(catMap),
                            datasets: [{
                                data: Object.values(catMap),
                                backgroundColor: ['rgba(26, 26, 26, 0.8)', 'rgba(168, 162, 151, 0.8)', 'rgba(240, 237, 231, 0.8)']
                            }]
                        },
                        options: { 
                            responsive: true, 
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom', labels: { font: { size: 9 } } } }
                        }
                    });
                }
            }
        }
    </script>
    <style>
        .font-serif { font-family: 'Times', serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>

<body x-data="analyticsComponent()" class="bg-white font-sans text-[#1A1A1A]">
    <div class="flex h-screen overflow-hidden bg-white">
        <include src="./partials/sidebar.html"></include>

        <div class="relative flex flex-col flex-1 overflow-y-auto bg-white">
            <include src="./partials/header.html" />

            <main class="p-6 md:p-10">
                <div class="mb-10 flex justify-between items-end border-b border-[#F0EDE7] pb-8">
                    <div>
                        <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">Reports & Analytics</h2>
                        <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Data-Driven Decision Support System</p>
                    </div>
                    <button onclick="window.print()" class="bg-[#1A1A1A] text-white px-8 py-3 text-[10px] font-bold uppercase tracking-[0.2em] rounded shadow-lg hover:bg-opacity-80">
                        Generate Report
                    </button>
                </div>

                <div class="grid grid-cols-12 gap-6 mb-8">
                    <div class="col-span-12 md:col-span-3 border border-[#E5E1DA] p-8">
                        <p class="text-[9px] font-black text-[#A8A297] uppercase tracking-widest mb-2">Net Inflow</p>
                        <h4 class="text-2xl font-black" x-text="'₱' + totalRevenue.toLocaleString()"></h4>
                    </div>
                    <div class="col-span-12 md:col-span-3 border border-[#E5E1DA] bg-[#F9F5F0] p-8">
                        <p class="text-[9px] font-black text-[#A8A297] uppercase tracking-widest mb-2">Penalty Recovery</p>
                        <h4 class="text-2xl font-black text-red-600" x-text="'₱' + totalPenalties.toLocaleString()"></h4>
                    </div>
                    <div class="col-span-12 md:col-span-3 border border-[#E5E1DA] p-8">
                        <p class="text-[9px] font-black text-[#A8A297] uppercase tracking-widest mb-2">Best Seller</p>
                        <h4 class="text-lg font-bold truncate" x-text="topPerformer"></h4>
                    </div>
                    <div class="col-span-12 md:col-span-3 border border-[#E5E1DA] p-8">
                        <p class="text-[9px] font-black text-[#A8A297] uppercase tracking-widest mb-2">Churn Rate</p>
                        <h4 class="text-2xl font-black" x-text="cancellationRate + '%'"></h4>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-8">
                    <div class="col-span-12 lg:col-span-6 border border-[#E5E1DA] p-8 min-h-[400px]">
                        <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b pb-4">Revenue Trend</h3>
                        <div class="h-64"><canvas id="revenueChart"></canvas></div>
                    </div>

                    <div class="col-span-12 lg:col-span-3 border border-[#E5E1DA] p-8 min-h-[400px]">
                        <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b pb-4">By Event Category</h3>
                        <div class="h-64"><canvas id="categoryChart"></canvas></div>
                    </div>

                    <div class="col-span-12 lg:col-span-3 border border-[#E5E1DA] p-8 min-h-[400px]">
                        <h3 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-6 border-b pb-4">Asset Health</h3>
                        <div class="h-64"><canvas id="inventoryChart"></canvas></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
