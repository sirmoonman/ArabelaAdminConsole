<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaction Logs | Arabela Admin</title>
    <script src="js/database.js"></script>
    <script>
      if (localStorage.getItem('arabela_session_active') !== 'true') {
        window.location.replace('login.html');
      }
    </script>
    <style>
      .font-serif { font-family: 'Times', serif; }
      [x-cloak] { display: none !important; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body
    x-data="{ 
      'sidebarToggle': false,
      'reservations': ArabelaDB.getReservations(),
      'searchQuery': '',
      'typeFilter': 'All',
      
      get transactions() {
        let txs = [];
        this.reservations.forEach(r => {
          if (['Reserved', 'Approved', 'Confirmed', 'On Rent', 'Completed'].includes(r.status)) {
            txs.push({
              id: 'TX-DEP-' + r.id,
              refId: r.id,
              date: r.createdAt,
              client: r.name,
              type: 'Security Deposit',
              amount: 2000,
              status: 'Cleared'
            });
          }
          if (r.status === 'Completed' && r.finalFine && r.finalFine > 0) {
            txs.push({
              id: 'TX-FNE-' + r.id,
              refId: r.id,
              date: r.returnDate ? new Date(r.returnDate).getTime() : new Date().getTime(),
              client: r.name,
              type: 'Late Return Penalty',
              amount: parseFloat(r.finalFine),
              status: 'Cleared'
            });
          }
        });
        return txs.sort((a, b) => b.date - a.date);
      },

      get filteredTransactions() {
        return this.transactions.filter(tx => {
          const matchSearch = tx.client.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                              tx.id.toLowerCase().includes(this.searchQuery.toLowerCase());
          const matchType = this.typeFilter === 'All' || tx.type === this.typeFilter;
          return matchSearch && matchType;
        });
      },

      get totalRevenue() {
        return this.filteredTransactions.reduce((sum, tx) => sum + tx.amount, 0);
      },

      get totalFines() {
        return this.filteredTransactions.filter(tx => tx.type === 'Late Return Penalty').reduce((sum, tx) => sum + tx.amount, 0);
      }
    }"
    class="bg-white font-sans text-[#1A1A1A]"
  >
    <div class="flex h-screen overflow-hidden bg-white">
      
      <include src="./partials/sidebar.html"></include>

      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">
        
        <include src="./partials/header.html"></include>

        <main>
          <div class="p-6 mx-auto max-w-(--breakpoint-2xl) md:p-10">
            
            <div class="mb-10 flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between border-b border-[#F0EDE7] pb-8">
              <div>
                <h2 class="text-3xl font-bold uppercase tracking-[0.2em] font-serif">Financial Ledger</h2>
                <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Transaction & Penalty Auditing</p>
              </div>
              <div class="flex gap-4">
                <div class="bg-red-50 text-red-700 px-6 py-4 rounded-sm text-right border border-red-100">
                  <p class="text-[8px] font-black uppercase tracking-widest mb-1">Filtered Penalties</p>
                  <p class="text-2xl font-black" x-text="'₱' + totalFines.toLocaleString(undefined, {minimumFractionDigits: 2})"></p>
                </div>
                <div class="bg-[#1A1A1A] text-white px-6 py-4 rounded-sm text-right shadow-md">
                  <p class="text-[8px] font-black uppercase tracking-widest mb-1 text-[#A8A297]">Filtered Inflow</p>
                  <p class="text-2xl font-black" x-text="'₱' + totalRevenue.toLocaleString(undefined, {minimumFractionDigits: 2})"></p>
                </div>
              </div>
            </div>

            <div class="mb-8 flex flex-col md:flex-row gap-6 justify-between items-center bg-[#F9F5F0] p-4 border border-[#E5E1DA] rounded-sm">
              <div class="flex gap-4 w-full md:w-auto">
                <select x-model="typeFilter" class="bg-white border border-[#E5E1DA] p-3 text-[10px] font-bold uppercase tracking-widest outline-none focus:border-[#1A1A1A] min-w-[200px]">
                  <option value="All">All Transactions</option>
                  <option value="Security Deposit">Security Deposits Only</option>
                  <option value="Late Return Penalty">Penalty/Fines Only</option>
                </select>
              </div>
              <div class="w-full md:w-1/3">
                <input type="text" x-model="searchQuery" placeholder="Search Client or TX-ID..." class="w-full bg-white border border-[#E5E1DA] p-3 text-[10px] font-bold uppercase tracking-widest outline-none focus:border-[#1A1A1A] placeholder-[#A8A297]">
              </div>
            </div>

            <div class="rounded-sm border border-[#E5E1DA] bg-white shadow-sm overflow-x-auto">
              <div class="flex flex-col min-w-[1100px]">
                
                <div class="grid grid-cols-12 bg-[#F9F5F0] border-b border-[#E5E1DA] text-[11px] font-bold uppercase tracking-[0.2em] text-[#A8A297]">
                  <div class="p-6 col-span-3">Transaction ID & Date</div>
                  <div class="p-6 col-span-3">Client Information</div>
                  <div class="p-6 col-span-3 text-center">Entry Type</div>
                  <div class="p-6 col-span-2 text-right">Amount (₱)</div>
                  <div class="p-6 col-span-1 text-center">Status</div>
                </div>

                <template x-for="tx in filteredTransactions" :key="tx.id">
                  <div class="grid grid-cols-12 border-b border-[#F0EDE7] items-center hover:bg-[#F9F5F0]/30 transition-colors">
                    
                    <div class="p-8 col-span-3">
                      <p class="text-sm font-bold text-[#1A1A1A] mb-1 font-mono uppercase" x-text="tx.id"></p>
                      <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-widest" x-text="new Date(tx.date).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })"></p>
                    </div>

                    <div class="p-8 col-span-3">
                      <p class="text-sm font-bold text-[#1A1A1A] mb-1 uppercase" x-text="tx.client"></p>
                      <p class="text-[9px] text-[#A8A297] font-black uppercase tracking-widest" x-text="'RES REF: ARB-' + tx.refId"></p>
                    </div>

                    <div class="p-8 col-span-3 text-center">
                      <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border"
                            :class="tx.type === 'Late Return Penalty' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-[#F9F5F0] text-[#1A1A1A] border-[#E5E1DA]'"
                            x-text="tx.type"></span>
                    </div>

                    <div class="p-8 col-span-2 text-right">
                      <p class="text-lg font-black" 
                         :class="tx.type === 'Late Return Penalty' ? 'text-red-600' : 'text-green-600'"
                         x-text="'+ ' + tx.amount.toLocaleString(undefined, {minimumFractionDigits: 2})"></p>
                    </div>

                    <div class="p-8 col-span-1 text-center">
                      <p class="text-[10px] font-bold text-green-600 uppercase tracking-widest" x-text="tx.status"></p>
                    </div>

                  </div>
                </template>

                <template x-if="filteredTransactions.length === 0">
                  <div class="p-32 text-center">
                    <p class="text-[11px] text-[#A8A297] font-bold uppercase tracking-[0.4em]">No transaction records found.</p>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </body>
</html>
