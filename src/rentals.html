<!DOCTYPE html>

<html lang="en">

  <head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Active Rentals | Arabela Admin</title>

    <script src="js/database.js"></script>

    <script>

      // Authentication Guard

      if (localStorage.getItem('arabela_session_active') !== 'true') {

        window.location.replace('login.html');

      }

    </script>

    <style>

      .font-serif { font-family: 'Times', serif; }

      [x-cloak] { display: none !important; }

    </style>

  </head>

  <body

    x-data="{

      'sidebarToggle': false,

      'showReturnModal': false,

      'selectedRes': null,

      'reservations': ArabelaDB.getReservations(),

      'returnDetails': { condition: 'Good', surcharge: 0 },

     

      // Load Dynamic Configuration for penalty logic [cite: 379]

      'config': JSON.parse(localStorage.getItem('arabela_config')) || { lateFeePerDay: 200 },



      get activeRentals() {

        return this.reservations.filter(r => r.status === 'On Rent');

      },



      getPenaltyData(deadline) {

        if (!deadline) return { status: 'On Time', cost: 0, isLate: false, daysLate: 0 };

        const today = new Date();

        const due = new Date(deadline);

        today.setHours(0,0,0,0);

        due.setHours(0,0,0,0);

       

        if (today > due) {

          const diff = Math.ceil((today - due) / (1000 * 60 * 60 * 24));

          // Use dynamic fee from config [cite: 97]

          return { status: 'Late', cost: diff * this.config.lateFeePerDay, isLate: true, daysLate: diff };

        }

        return { status: 'On Time', cost: 0, isLate: false, daysLate: 0 };

      },



      initiateReturn(res) {

        this.selectedRes = res;

        const penalty = this.getPenaltyData(res.deadline);

        this.returnDetails.surcharge = penalty.cost;

        this.showReturnModal = true;

      },



      finalizeReturn() {

        // 1. Log Transaction Data for Audit Trail [cite: 98, 257]

        this.selectedRes.status = 'Completed';

        this.selectedRes.finalFine = this.returnDetails.surcharge;

        this.selectedRes.returnDate = new Date().toISOString();

        this.selectedRes.returnCondition = this.returnDetails.condition;

       

        ArabelaDB.saveReservations(this.reservations);



        // 2. Inventory Maintenance Routing [cite: 53, 90]

        if (this.returnDetails.condition === 'Damaged' || this.returnDetails.condition === 'Stained') {

          ArabelaDB.syncGownStatus(this.selectedRes.gownId, 'Damaged');

        } else {

          ArabelaDB.syncGownStatus(this.selectedRes.gownId, 'Available');

        }



        this.showReturnModal = false;

        alert('Return Protocol Complete. Transaction archived in Ledger.');

        location.reload();

      }

    }"

    class="bg-white font-sans text-[#1A1A1A]"

  >

    <div class="flex h-screen overflow-hidden bg-white">

      <include src="./partials/sidebar.html"></include>



      <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto bg-white">

        <include src="./partials/header.html" />



        <main>

          <div class="p-6 mx-auto max-w-(--breakpoint-2xl) md:p-10">

           

            <div class="mb-10 border-b border-[#F0EDE7] pb-8">

              <h2 class="text-3xl font-bold text-[#1A1A1A] uppercase tracking-[0.2em] font-serif">Active Rentals</h2>

              <p class="text-[10px] text-[#A8A297] font-bold uppercase tracking-[0.3em] mt-2">Deployed Asset Monitoring & Penalty Tracking</p>

            </div>



            <div class="rounded-sm border border-[#E5E1DA] bg-white shadow-sm overflow-x-auto">

              <div class="flex flex-col min-w-[1100px]">

               

                <div class="grid grid-cols-12 bg-[#F9F5F0] border-b border-[#E5E1DA] text-[11px] font-bold uppercase tracking-[0.2em] text-[#A8A297]">

                  <div class="p-6 col-span-3">Customer Details</div>

                  <div class="p-6 col-span-2">Item Identity</div>

                  <div class="p-6 col-span-3 text-center">Rental Window</div>

                  <div class="p-6 col-span-2 text-center">Late Penalties (₱)</div>

                  <div class="p-6 col-span-2 text-center">Action</div>

                </div>



                <template x-for="res in activeRentals" :key="res.id">

                  <div class="grid grid-cols-12 border-b border-[#F0EDE7] items-center hover:bg-[#F9F5F0]/30 transition-colors">

                   

                    <div class="p-8 col-span-3">

                      <p class="text-lg font-bold text-[#1A1A1A] mb-1" x-text="res.name"></p>

                      <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-[0.15em]" x-text="'REF NO: ARB-' + res.id"></p>

                    </div>



                    <div class="p-8 col-span-2">

                      <p class="text-sm font-semibold text-[#1A1A1A] mb-1" x-text="res.gown"></p>

                      <p class="text-[10px] text-[#A8A297] font-black uppercase tracking-wider" x-text="'ID: #' + res.gownId"></p>

                    </div>



                    <div class="p-8 col-span-3 text-center">

                      <div class="inline-flex items-center gap-8 px-8 py-3 bg-[#F9F5F0] rounded-sm border border-[#E5E1DA]">

                        <div class="text-left">

                          <p class="text-[#A8A297] uppercase font-bold text-[8px] tracking-tighter mb-1">Released</p>

                          <p class="font-bold text-xs text-[#1A1A1A]" x-text="new Date(res.createdAt).toLocaleDateString('en-GB')"></p>

                        </div>

                        <div class="h-10 border-l border-[#E5E1DA]"></div>

                        <div class="text-left">

                          <p class="text-[#A8A297] uppercase font-bold text-[8px] tracking-tighter mb-1">Return Due</p>

                          <p class="font-bold text-xs text-[#1A1A1A]" x-text="new Date(res.deadline).toLocaleDateString('en-GB')"></p>

                        </div>

                      </div>

                    </div>



                    <div class="p-8 col-span-2 text-center">

                      <div class="flex flex-col items-center gap-2">

                        <span :class="getPenaltyData(res.deadline).isLate ? 'bg-red-50 text-red-600 border-red-200' : 'bg-green-50 text-green-600 border-green-200'"

                              class="text-[10px] font-black uppercase tracking-widest border px-4 py-1.5 rounded shadow-sm"

                              x-text="getPenaltyData(res.deadline).status">

                        </span>

                        <p class="text-xl font-black mt-1"

                           :class="getPenaltyData(res.deadline).isLate ? 'text-red-600' : 'text-[#1A1A1A]'"
