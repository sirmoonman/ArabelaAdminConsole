<aside
  :class="sidebarToggle ? 'translate-x-0' : '-translate-x-full'"
  class="absolute left-0 top-0 z-9999 flex h-screen w-72.5 flex-col overflow-y-hidden bg-[#F9F5F0] border-r border-[#E5E1DA] duration-300 ease-linear lg:static lg:translate-x-0"
  @click.outside="sidebarToggle = false"
>
  <div class="flex items-center justify-between gap-2 px-6 py-5.5 lg:py-6.5">
    <a href="index.html" class="flex items-center gap-3">
      <h1 class="text-2xl font-bold text-[#1A1A1A] tracking-[0.25em] font-serif uppercase">ARABELA</h1>
    </a>

    <button class="block lg:hidden" @click.stop="sidebarToggle = !sidebarToggle">
      <svg class="fill-[#1A1A1A]" width="20" height="18" viewBox="0 0 20 18" fill="none">
        <path d="M19 8.175H2.98748L9.36248 1.6875C9.69998 1.35 9.69998 0.825 9.36248 0.4875C9.02498 0.15 8.49998 0.15 8.16248 0.4875L0.399976 8.3625C0.0624756 8.7 0.0624756 9.225 0.399976 9.5625L8.16248 17.4375C8.49998 17.775 9.02498 17.775 9.36248 17.4375C9.69998 17.1 9.69998 16.575 9.36248 16.2375L2.98748 9.825H19C19.45 9.825 19.825 9.45 19.825 9C19.825 8.55 19.45 8.175 19 8.175Z" />
      </svg>
    </button>
  </div>

  <div class="no-scrollbar flex flex-col overflow-y-auto duration-300 ease-linear flex-grow">
    <nav class="mt-5 py-4 px-4 lg:mt-9 lg:px-6">
      
      <div>
        <h3 class="mb-5 ml-4 text-[10px] font-bold text-[#A8A297] uppercase tracking-[0.3em]">Menu</h3>
        <ul class="mb-6 flex flex-col gap-2">
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="index.html" :class="{ 'bg-[#F0EDE7]': (window.location.pathname.includes('index.html') || window.location.pathname === '/') }">Overview</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="inventory.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('inventory.html') }">Gown Inventory</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="reservation.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('reservation.html') }">Reservation Queue</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="rentals.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('rentals.html') }">Current Rentals</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="transactions.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('transactions.html') }">Transaction Logs</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="crm.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('crm.html') }">Client Directory</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="analytics.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('analytics.html') }">Reports & Analytics</a>
          </li>
        </ul>
      </div>

      <div class="mt-10">
        <h3 class="mb-5 ml-4 text-[10px] font-bold text-[#A8A297] uppercase tracking-[0.3em]">Management</h3>
        <ul class="mb-6 flex flex-col gap-2">
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="settings.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('settings.html') }">System Settings</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="profile.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('profile.html') }">Admin Profile</a>
          </li>
          <li>
            <a class="group relative flex items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7]" href="notifications.html" :class="{ 'bg-[#F0EDE7]': window.location.pathname.includes('notifications.html') }">Notifications</a>
          </li>
          <li>
            <button 
              @click="localStorage.removeItem('arabela_session_active'); window.location.replace('login.html');"
              class="group relative flex w-full items-center gap-2.5 rounded-sm py-2.5 px-4 text-sm font-semibold text-[#1A1A1A] duration-200 ease-in-out hover:bg-[#F0EDE7] text-left"
            >
              Logout
            </button>
          </li>
        </ul>
      </div>
    </nav>
  </div>

  <div class="mt-auto p-6 border-t border-[#E5E1DA] bg-[#F9F5F0]">
    <button 
      @click="if(confirm('Reset all system data?')) { localStorage.clear(); window.location.href='login.html'; }"
      class="group relative flex w-full items-center gap-2.5 rounded-sm py-2 px-4 text-[10px] font-bold text-[#A8A297] uppercase tracking-widest hover:text-red-600 transition-colors text-left"
    >
      <svg class="fill-current" width="14" height="14" viewBox="0 0 24 24">
        <path d="M9 3v1H4v2h1v13a2 2 0 002 2h10a2 2 0 002-2V6h1V4h-5V3H9z"/>
      </svg>
      Factory Reset
    </button>
    <p class="mt-4 text-[10px] text-[#A8A297] text-center tracking-widest uppercase opacity-60">Arabela v1.0.0</p>
  </div>
</aside>
