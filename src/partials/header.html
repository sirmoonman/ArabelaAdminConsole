<header class="sticky top-0 z-999 flex w-full bg-white drop-shadow-1">
  <div class="flex flex-grow items-center justify-between px-4 py-4 shadow-2 md:px-6 2xl:px-11 border-b border-[#F0EDE7]">
    
    <div class="flex items-center gap-2 sm:gap-4">
      <button
        class="z-99999 block rounded-sm border border-stroke bg-white p-1.5 shadow-sm lg:hidden"
        @click.stop="sidebarToggle = !sidebarToggle"
      >
        <span class="relative block h-5.5 w-5.5 cursor-pointer">
          <span class="du-block absolute right-0 h-full w-full">
            <span class="relative left-0 top-0 my-1 block h-0.5 w-0 rounded-sm bg-black delay-[0] duration-200 ease-in-out" :class="{ '!w-full delay-300': !sidebarToggle }"></span>
            <span class="relative left-0 top-0 my-1 block h-0.5 w-0 rounded-sm bg-black delay-150 duration-200 ease-in-out" :class="{ '!w-full delay-400': !sidebarToggle }"></span>
            <span class="relative left-0 top-0 my-1 block h-0.5 w-0 rounded-sm bg-black delay-200 duration-200 ease-in-out" :class="{ '!w-full delay-500': !sidebarToggle }"></span>
          </span>
        </span>
      </button>

      <div class="hidden sm:block relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#A8A297]">
          <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M13.88 12.46l4.63 4.63-1.42 1.42-4.63-4.63a7.5 7.5 0 111.42-1.42zM7.5 13a5.5 5.5 0 100-11 5.5 5.5 0 000 11z" />
          </svg>
        </span>
        <input 
          type="text" 
          placeholder="Search Records (e.g. ARB-1002)" 
          class="w-80 bg-[#F9F5F0] border border-[#E5E1DA] rounded-sm py-3 pl-12 pr-4 text-[10px] font-bold uppercase tracking-widest outline-none focus:border-[#1A1A1A] transition-all"
        >
      </div>
    </div>

    <div class="flex items-center gap-3 2xsm:gap-7">
      <ul class="flex items-center gap-2 2xsm:gap-4">
        <li>
          <a href="notifications.html" class="relative flex h-8.5 w-8.5 items-center justify-center rounded-full border-[0.5px] border-[#E5E1DA] bg-[#F9F5F0] hover:text-[#1A1A1A] transition-colors">
            <span class="absolute -top-0.5 -right-0.5 z-1 h-2 w-2 rounded-full bg-red-500"></span>
            <svg class="fill-current" width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 18a2 2 0 002-2H7a2 2 0 002 2zm6-6V7a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2z" />
            </svg>
          </a>
        </li>
      </ul>

      <a href="profile.html" class="flex items-center gap-4">
        <span class="hidden text-right lg:block">
          <span class="block text-[10px] font-bold text-[#1A1A1A] uppercase tracking-widest">Jose Miguel Tolentino C.</span>
          <span class="block text-[8px] font-medium text-[#A8A297] uppercase tracking-widest">Administrator</span>
        </span>
        <span class="h-12 w-12 rounded-full bg-[#1A1A1A] flex items-center justify-center text-white text-xs font-serif">
          JMT
        </span>
      </a>
    </div>
  </div>
</header>
