<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Authentication | Arabela Admin</title>
    <script src="js/database.js"></script>
    <style>
      .font-serif { font-family: 'Times', serif; }
      [x-cloak] { display: none !important; }
    </style>
  </head>
  <body class="bg-[#F9F5F0] font-sans text-[#1A1A1A] h-screen flex items-center justify-center selection:bg-[#1A1A1A] selection:text-white">
    
    <div 
      x-data="{ 
        username: '', 
        password: '', 
        isLoading: false, 
        errorMessage: '',
        
        attemptLogin() {
          this.isLoading = true;
          this.errorMessage = '';
          
          // Simulated server-side validation delay (1.2 seconds)
          setTimeout(() => {
            // Defense Demo Credentials
            if (this.username === 'admin' && this.password === 'admin123') {
              // Establish local session and redirect to Overview
              localStorage.setItem('arabela_session_active', 'true');
              localStorage.setItem('arabela_active_user', 'EMP-001');
              window.location.href = 'index.html';
            } else {
              // Reject and reset state
              this.isLoading = false;
              this.errorMessage = 'Authentication failed. Invalid system ID or passcode.';
              this.password = ''; 
            }
          }, 1200);
        }
      }"
      class="w-full max-w-md p-6"
    >
      <div class="text-center mb-10">
        <h1 class="text-4xl font-bold tracking-[0.25em] font-serif uppercase text-[#1A1A1A] mb-2">Arabela</h1>
        <p class="text-[9px] font-bold text-[#A8A297] uppercase tracking-[0.3em]">Admin Console</p>
      </div>

      <div class="bg-white p-10 rounded-sm shadow-xl border border-[#E5E1DA]">
        <h2 class="text-xs font-serif font-bold uppercase tracking-[0.2em] mb-8 border-b border-[#F0EDE7] pb-4 text-center">Authorized Personnel Only</h2>
        
        <form @submit.prevent="attemptLogin()" class="space-y-6">
          
          <div x-show="errorMessage" x-cloak class="bg-red-50 border border-red-200 text-red-600 text-[10px] font-bold uppercase tracking-widest p-4 text-center rounded-sm">
            <span x-text="errorMessage"></span>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-[#A8A297] uppercase mb-2 tracking-widest">System ID</label>
            <input 
              type="text" 
              x-model="username" 
              required 
              autofocus
              class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 text-sm font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] focus:bg-white transition-colors"
              placeholder="Enter Admin ID"
            >
          </div>
          
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="block text-[10px] font-bold text-[#A8A297] uppercase tracking-widest">Passcode</label>
              <a href="#" class="text-[9px] font-bold text-[#A8A297] hover:text-[#1A1A1A] uppercase tracking-widest transition-colors">Recovery Protocol</a>
            </div>
            <input 
              type="password" 
              x-model="password" 
              required 
              class="w-full border border-[#E5E1DA] bg-[#F9F5F0] p-4 text-sm font-bold text-[#1A1A1A] outline-none focus:border-[#1A1A1A] focus:bg-white transition-colors"
              placeholder="••••••••"
            >
          </div>

          <button 
            type="submit" 
            :disabled="isLoading" 
            class="w-full bg-[#1A1A1A] text-white p-4 text-[11px] font-bold uppercase tracking-[0.2em] rounded-sm shadow-md hover:bg-opacity-90 transition-all disabled:opacity-70 mt-4 h-14"
          >
            <span x-show="!isLoading">Authenticate</span>
            <span x-show="isLoading" x-cloak class="animate-pulse">Verifying Credentials...</span>
          </button>
        </form>
      </div>

      <div class="text-center mt-10">
        <p class="text-[9px] text-[#A8A297] uppercase tracking-widest">© 2026 Arabela Management Information System</p>
        <p class="text-[8px] text-[#A8A297] uppercase tracking-widest mt-1">System Version 1.0.0</p>
      </div>
    </div>

  </body>
</html>
